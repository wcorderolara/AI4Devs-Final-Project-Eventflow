name: 'Prisma Migrate Deploy'
description: >
  US-139 (PB-P0-018) — Aplica migraciones Prisma con `prisma migrate deploy` (forward-only, sin
  `migrate reset`). Enmascara la DATABASE_URL en los logs (`::add-mask::`). Reusable desde
  `pr.yml` (job migrations-validate) y desde los futuros workflows de deploy (main/staging,
  PB-P2-023..026). Ejemplo:
    - uses: ./.github/actions/prisma-migrate
      with:
        database-url: ${{ secrets.DATABASE_URL }}
inputs:
  database-url:
    description: 'Conexión Postgres destino. Se enmascara en logs. NUNCA hardcodear secretos.'
    required: true
  working-directory:
    description: 'Directorio del paquete backend (contiene prisma/ y los scripts npm).'
    required: false
    default: backend
runs:
  using: composite
  steps:
    - name: Enmascarar DATABASE_URL
      shell: bash
      run: echo "::add-mask::${{ inputs.database-url }}"
    - name: prisma migrate deploy (forward-only)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DATABASE_URL: ${{ inputs.database-url }}
      run: npm run db:migrate:deploy
