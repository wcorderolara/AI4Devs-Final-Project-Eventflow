name: CI

# US-099 (PB-P0-001) — Gates de schema Prisma. Falla de cualquier job bloquea el merge.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: backend

env:
  # Valor dummy: `prisma validate`/`generate` no requieren conexión real a BD (US-099).
  DATABASE_URL: postgresql://user:password@localhost:5432/eventflow?schema=public

jobs:
  # OPS-003 (VR-01) — prisma validate.
  prisma-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:validate

  # OPS-004 (VR-02) — prisma generate.
  prisma-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate

  # OPS-005 — tests estructurales Vitest (QA-001..QA-008) + typecheck del smoke (BE-001).
  schema-structural-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm test
      # US-121 / OPS-001 (PB-P0-010) — checks PromptOps: registry válido, no duplicate active,
      # hash/version drift, metadata sync/export, no secrets/PII y no Future/P4 active. Sin red ni secrets.
      - run: npm run promptops:check

  # SEC-001 — secret scan defensivo sobre prisma/ (gitleaks) además del test de secret scan.
  secret-scan-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (backend/prisma)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  # ───────────────────────────────────────────────────────────────────────────
  # US-100 (PB-P0-001) — Baseline migration + flujo migrate dev/deploy.
  # ───────────────────────────────────────────────────────────────────────────

  # OPS-001 (AC-04, VR-01, VR-07) — Drift detection: `migrate diff --exit-code`.
  # Exit 2 (drift) bloquea el merge. Requiere shadow DB para reproducir las migrations.
  prisma-migrate-diff:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: eventflow
          POSTGRES_PASSWORD: eventflow
          POSTGRES_DB: eventflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://eventflow:eventflow@localhost:5432/eventflow?schema=public
      SHADOW_DATABASE_URL: postgresql://eventflow:eventflow@localhost:5432/eventflow_shadow?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Crear shadow database
        run: PGPASSWORD=eventflow psql -h localhost -U eventflow -d eventflow -c "CREATE DATABASE eventflow_shadow;"
      - name: Drift detection (migrate diff --exit-code)
        run: npm run db:migrate:diff

  # OPS-002 (AC-03, AC-05, VR-02, EC-02) — Smoke deploy contra DB ephemeral + verificación
  # de 22 tablas (19 US-099 + sessions y password_reset_tokens de US-094/PB-P0-004
  # + vendor_profile_categories de US-040/PB-P1-024) + 13 enums canónicos vía
  # information_schema/pg_type + idempotency. US-044/PB-P1-027 retira `VendorServiceStatus`
  # (columna `status` de `vendor_services` deprecada por `is_active`).
  prisma-migrate-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: eventflow
          POSTGRES_PASSWORD: eventflow
          POSTGRES_DB: eventflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://eventflow:eventflow@localhost:5432/eventflow?schema=public
      PGPASSWORD: eventflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: migrate deploy (primera aplicación)
        run: npm run db:migrate:deploy
      - name: Verificar 22 tablas físicas (19 US-099 + sessions y password_reset_tokens US-094 + vendor_profile_categories US-040)
        run: |
          COUNT=$(psql -h localhost -U eventflow -d eventflow -tA -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE' AND table_name <> '_prisma_migrations';")
          echo "Tablas físicas: $COUNT"
          test "$COUNT" -eq 22
      - name: Verificar los 13 enums canónicos
        run: |
          for e in UserRole CurrencyCode LanguageCode LLMProvider EventStatus QuoteRequestStatus QuoteStatus BookingIntentStatus ReviewStatus NotificationStatus AttachmentStatus VendorProfileStatus AIRecommendationStatus; do
            FOUND=$(psql -h localhost -U eventflow -d eventflow -tA -c "SELECT count(*) FROM pg_type t JOIN pg_namespace n ON n.oid=t.typnamespace WHERE t.typtype='e' AND n.nspname='public' AND t.typname='$e';")
            if [ "$FOUND" -ne 1 ]; then echo "❌ enum faltante: $e"; exit 1; fi
          done
          echo "✅ 13 enums canónicos presentes"
      - name: Idempotency (segunda deploy → sin cambios)
        run: |
          OUT=$(npm run db:migrate:deploy 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "No pending migrations to apply"
      # US-101 OPS-001 — Verificación de inventario de índices (AC-05) tras deploy en DB ephemeral.
      - name: Inventario de índices críticos (tests de integración US-101)
        run: npm run db:generate && npx vitest run tests/integration

  # US-085 OPS-002 — Seed idempotente sobre Postgres efímero (BR-SEED-001, NFR-DEMO-003).
  # Ejecuta el CLI `npm run seed` dos veces y verifica que la 2ª ejecución reporta created=0.
  seed-idempotency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: eventflow
          POSTGRES_PASSWORD: eventflow
          POSTGRES_DB: eventflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://eventflow:eventflow@localhost:5432/eventflow?schema=public
      SEED_DEMO_ENABLED: 'true'
      LLM_PROVIDER: mock
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - name: Seed (1ª ejecución → created > 0)
        run: npm run seed | grep '^{"correlationId"' > /tmp/seed1.json
      - name: Seed (2ª ejecución → idempotente)
        run: npm run seed | grep '^{"correlationId"' > /tmp/seed2.json
      - name: Assert created=0 en la 2ª ejecución (idempotencia)
        run: |
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('/tmp/seed2.json','utf8'));const created=Object.values(r.domains).reduce((a,d)=>a+d.created,0);if(created!==0){console.error('❌ created='+created);process.exit(1)}console.log('✅ seed idempotente: created=0')"

  # OPS-003 (AC-01, AC-05, AC-09, AC-10) — Tests estructurales Vitest sobre migrations.
  migration-structural-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/eventflow?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npx vitest run tests/migrations

  # OPS-004 (AC-06, SEC-01..03, NT-02) — Secret scan sobre prisma/migrations/.
  # gitleaks repo-wide (secret-scan-schema) ya cubre backend/prisma/migrations/;
  # este job añade la verificación estructural determinista scoped a migrations.
  migration-secret-scan:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/eventflow?schema=public
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - name: Secret scan estructural (migrations)
        run: npx vitest run tests/migrations/migration-secret-scan.spec.ts
      - name: gitleaks scoped (backend/prisma/migrations)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  # OPS-005 (AC-10, SEC-05, NT-03) — Verifica que el wrapper env-aware bloquea reset en CI.
  migrate-reset-block-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: El wrapper debe fallar con CI=true (bloqueo real)
        # working-directory por defecto = backend (defaults.run), por eso la ruta es relativa a backend/.
        run: |
          if bash scripts/db-migrate-reset.sh; then
            echo "❌ El wrapper NO bloqueó en CI (esperado exit != 0)"
            exit 1
          else
            echo "✅ Wrapper bloqueó correctamente en CI (exit != 0)"
          fi

  # US-098 (AC-03, VR-01/02, CT-01) — OpenAPI contract gate: valida el snapshot y detecta drift.
  openapi-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint OpenAPI (validador estructural)
        run: npm run openapi:lint
      - name: Drift gate (regenera desde código y compara con backend/openapi.json)
        run: npm run openapi:check
