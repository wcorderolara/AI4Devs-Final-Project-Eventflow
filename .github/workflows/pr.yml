name: PR Quality Gates

# US-134 (PB-P0-017) â€” Gates de calidad en Pull Request (Doc 21 Â§Â§16â€“17, ADR-DEVOPS-001,
# ADR-TEST-001/002). Corre lint + typecheck + tests + build para backend y frontend, mĂˇs un
# `docker build` del backend (sin push) y `next build` del frontend. NO usa secretos de cloud,
# NO usa `pull_request_target` y NO solicita `id-token`. `permissions: contents: read` (SEC).
#
# Convive con los workflows especializados existentes: `ci.yml` (gates de schema/migraciones/OpenAPI
# del backend) y `web-ci.yml` (pipeline frontend + E2E). Ver nota de alineaciĂłn N1 del execution record.

on:
  pull_request:
    branches: [main, qa]
  workflow_dispatch:

# SEC-01/AC-09: privilegio mĂ­nimo â€” solo lectura del contenido; sin escritura ni id-token.
permissions:
  contents: read

# AC-09/EC-05: un nuevo push al mismo PR cancela el run anterior en curso.
concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # AC-02 â€” Lint (matriz backend/frontend) con cache npm.
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: backend
            node: 22
          - pkg: web
            node: 22
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ${{ matrix.pkg }}/package-lock.json
      - run: npm ci
      - run: npm run lint

  # AC-03 â€” Typecheck (matriz backend/frontend) con cache npm.
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkg: backend
            node: 22
          - pkg: web
            node: 22
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ${{ matrix.pkg }}/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  # AC-04 â€” Tests backend (Vitest + Supertest). La suite de integraciĂłn se auto-omite sin
  # DATABASE_URL alcanzable (`describe.skipIf(!dbUp)`, EC-02); la suite unit corre igual.
  #
  # US-130 (PB-P2-018 Â· AC-01 Â· AC-05) â€” la suite negativa RBAC extendida
  # (`backend/tests/api/us130-*.spec.ts`) corre bajo este job por diseĂ±o. El gate estĂˇtico
  # `us130-coverage-gate.spec.ts` (DB-free) verifica que TODO endpoint del registry
  # `PROTECTED_ENDPOINTS` (US-112) tiene â‰Ą1 caso negativo cableado; su fallo bloquea el merge.
  # No se duplica un job dedicado (D-03 execution record US-130).
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm test

  # US-126 (PB-P2-014 Â· AC-03 Â· AC-05) â€” Coverage gate bloqueante. Corre `test:coverage`
  # con umbrales seteados en `vitest.config.ts` (lines/statements/functions â‰Ą55%, branches
  # â‰Ą75%). Si la cobertura cae por debajo, Vitest sale con exit != 0 y el merge se bloquea.
  # VR-02/SEC-02: sin `OPENAI_API_KEY` real; el suite usa `MockAIProvider` en `LLM_PROVIDER=mock`.
  #
  # US-129 (PB-P2-017 Â· AC-01 Â· AC-05) â€” la suite IA con MockAIProvider
  # (`backend/tests/unit/us129-ai-mock-suite.spec.ts` + suites preexistentes US-119/122/123)
  # tambiĂ©n corre bajo este job por diseĂ±o: `LLM_PROVIDER=mock` estĂˇ explĂ­cito abajo, el
  # merge queda bloqueado si algĂşn test de IA falla, y `OPENAI_API_KEY` NUNCA se pasa al
  # runner (SEC-02 Â· VR-02). No se duplica el job (D-03 execution record US-129).
  test-backend-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # ExplĂ­cito: sin key real de IA â€” protecciĂłn VR-02.
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run test:coverage
      - name: Upload coverage report (lcov + json-summary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: |
            backend/coverage/lcov.info
            backend/coverage/coverage-summary.json
          if-no-files-found: warn
          retention-days: 7

  # AC-04 â€” Tests frontend (Vitest + Testing Library + MSW).
  # US-127 (PB-P2-015 Â· AC-05): la suite de contract vive en `src/tests/contract/**`
  # y estĂˇ incluida en el glob de Vitest (`vitest.config.ts:include`), por lo que
  # `npm test` la ejecuta automĂˇticamente. Un fallo de contract (drift, schema no
  # conforme, red real detectada) bloquea el merge en este job.
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test

  # AC-05 â€” Build de la imagen Docker del backend (US-133), sin push a ningĂşn registro.
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (sin push)
        run: DOCKER_BUILDKIT=1 docker build -t eventflow-backend:ci ./backend

  # AC-06 â€” Build de producciĂłn del frontend (`next build`).
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  # US-139 (PB-P0-018) â€” ValidaciĂłn de migraciones Prisma: drift detection + `migrate deploy`
  # contra una Postgres efĂ­mera + smoke post-migraciĂłn. NO usa `prisma migrate reset` (VR-02).
  migrations-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # DB-001: imagen pinneada por versiĂłn (compatibilidad Prisma + tamaĂ±o).
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eventflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/eventflow_ci
      SHADOW_DATABASE_URL: postgres://postgres:postgres@localhost:5432/eventflow_ci_shadow
      PGPASSWORD: postgres
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      # EC-05: falla explĂ­cita si falta la conexiĂłn (no aplica migraciones a ciegas).
      - name: Verificar DATABASE_URL
        run: '[ -n "$DATABASE_URL" ] || { echo "::error::DATABASE_URL ausente"; exit 1; }'
      - name: Crear shadow database (drift detection)
        run: psql -h localhost -U postgres -d eventflow_ci -c "CREATE DATABASE eventflow_ci_shadow;"
      # AC-01/AC-08: drift detection â€” exit 2 (schema sin migraciĂłn) bloquea con mensaje guĂ­a.
      - name: Drift detection (migrate diff --exit-code)
        run: |
          if ! npm run db:migrate:diff; then
            echo "::error::Drift detectado: el schema Prisma no coincide con prisma/migrations. Corre 'npx prisma migrate dev' y commitea la migraciĂłn."
            exit 1
          fi
      # AC-01/AC-02: aplica migraciones vĂ­a la composite action reusable (DATABASE_URL enmascarada).
      - name: Aplicar migraciones (composite action)
        uses: ./.github/actions/prisma-migrate
        with:
          database-url: ${{ env.DATABASE_URL }}
          working-directory: backend
      # AC-03: smoke post-migraciĂłn (conectividad Prisma + tablas migradas).
      - name: Smoke post-migraciĂłn
        run: npm run test:integration:smoke
