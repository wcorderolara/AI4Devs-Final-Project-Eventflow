# US-031 (PB-P1-017 / API-001) — Snippet OpenAPI del endpoint bulk confirm HITL.
# Se integrará al snapshot global de OpenAPI vía US-098 (regeneración coordinada).
paths:
  /events/{eventId}/tasks/confirm-bulk:
    post:
      operationId: confirmAITasksBulk
      summary: Confirmar hasta 50 tareas IA en bloque
      description: >
        Bulk HITL para tareas IA (`AI-002 / checklist`). Recibe una lista de `taskIds` (post-dedup
        1..50), verifica ownership del evento y mutabilidad, y transiciona cada `EventTask` IA de
        `pending` a `active` en una micro-transacción propia. Semántica de éxito parcial controlado
        (no all-or-nothing) — la respuesta siempre reporta el resultado por ítem.
      tags: [tasks, ai]
      security:
        - sessionCookie: []
      parameters:
        - in: path
          name: eventId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskIds]
              properties:
                taskIds:
                  type: array
                  minItems: 1
                  maxItems: 50
                  uniqueItems: false
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Bulk procesado (posible éxito parcial).
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: object
                    required: [results, summary]
                    properties:
                      results:
                        type: array
                        items:
                          type: object
                          required: [taskId, accepted]
                          properties:
                            taskId: { type: string, format: uuid }
                            accepted: { type: boolean }
                            error:
                              type: object
                              required: [code, message]
                              properties:
                                code:
                                  type: string
                                  enum: [TASK_NOT_FOUND, TASK_NOT_IN_EVENT, TASK_NOT_AI, TASK_NOT_PENDING]
                                message: { type: string }
                      summary:
                        type: object
                        required: [requested, deduped, accepted, rejected]
                        properties:
                          requested: { type: integer, minimum: 0 }
                          deduped: { type: integer, minimum: 0 }
                          accepted: { type: integer, minimum: 0 }
                          rejected: { type: integer, minimum: 0 }
                  meta:
                    type: object
                    required: [correlationId, timestamp]
                    properties:
                      correlationId: { type: string }
                      timestamp: { type: string, format: date-time }
        '400':
          description: >
            `VALIDATION_ERROR` (body vacío / UUID inválido) o `BULK_LIMIT_EXCEEDED`
            (>50 IDs post-dedup).
        '401': { description: 'AUTHENTICATION_REQUIRED — sin sesión.' }
        '403': { description: 'FORBIDDEN — actor con rol admin/otro (FR-ADMIN-010).' }
        '404': { description: 'RESOURCE_NOT_FOUND — evento ajeno o inexistente (no-revelación).' }
        '409': { description: 'EVENT_NOT_MUTABLE — evento cancelled/completed/soft-deleted.' }
