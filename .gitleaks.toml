# Configuración de gitleaks para el repositorio.
# Extiende el ruleset por defecto (no lo reemplaza) y añade un allowlist mínimo y explícito
# para fixtures de test que NO son secretos reales. Se listan los valores exactos (no rutas
# completas) para no debilitar el escaneo del resto de los archivos de test.
[extend]
useDefault = true

[allowlist]
description = "Fixtures de test con secretos falsos (no reales) — US-089/US-091/US-108/US-109"
regexes = [
  # JWT_SECRET dummy usado por los tests de config y del pipeline de middlewares.
  '''test_jwt_secret_min_32_characters_long_xx''',
  # Secret incorrecto usado para forjar un JWT inválido en el test de authMiddleware.
  '''wrong-secret-that-is-not-real-000''',
  # SESSION_SECRET dummy de los tests de config/cookie (US-094/US-108).
  '''test_session_secret_min_32_characters_long_xx''',
  # RECAPTCHA_SECRET_KEY falso para fixtures de config de captcha (US-108/US-109).
  '''real-recaptcha-secret''',
  # Canaries de redacción de logs (US-108/US-109): valores que los tests verifican NO se filtran.
  '''leak-secret-value''',
  '''leak-token-value''',
  # Identificadores de ADR / requisitos del catálogo documental (formato canónico
  # `ADR-<AREA>-<NNN>`, ej. `ADR-DEVOPS-001`, `ADR-API-004`, `ADR-SEC-001`). Son
  # referencias documentales — no secretos. Aparecen ampliamente en execution
  # records, backlog prioritized, tech specs y prose de commits. US-113/US-114
  # los referencian ~100 veces por row del índice; sin este allowlist gitleaks
  # los flaggea como `generic-api-key` por entropía.
  '''ADR-[A-Z]+-\d{3}''',
]
